<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .icon-lime { fill: #FFD60A; }
      .icon-white { fill: #FFFFFF; }
      .icon-muted { fill: #B0B0B0; }
    </style>
  </defs>

  <!-- PROOF / VERIFICATION ICONS -->
  
  <!-- Icon 1: Checkmark Shield -->
  <g id="checkmark-shield" transform="translate(50, 50)">
    <path class="icon-lime" d="M12 2L6 5V12C6 18 12 22 12 22C12 22 18 18 18 12V5L12 2M9 13L11 15L15 11" stroke="#0D0D0D" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 2: Scan Line -->
  <g id="scan-line" transform="translate(150, 50)">
    <line class="icon-lime" x1="2" y1="8" x2="22" y2="8" stroke="#FFD60A" stroke-width="2"/>
    <line class="icon-lime" x1="2" y1="12" x2="22" y2="12" stroke="#FFD60A" stroke-width="1" opacity="0.6"/>
    <line class="icon-lime" x1="2" y1="16" x2="22" y2="16" stroke="#FFD60A" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Icon 3: Chart Up -->
  <g id="chart-up" transform="translate(250, 50)">
    <polyline class="icon-lime" points="2,18 6,14 10,16 14,10 18,12 22,8" stroke="#FFD60A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="icon-lime" x1="2" y1="18" x2="2" y2="22" stroke="#FFD60A" stroke-width="2"/>
  </g>

  <!-- Icon 4: Warning Triangle -->
  <g id="warning-triangle" transform="translate(350, 50)">
    <path class="icon-lime" d="M12 2L22 20H2L12 2M12 10V14M12 18V18.5" stroke="#0D0D0D" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- HEALTH / BODY ICONS -->

  <!-- Icon 5: Spine Neck (C1-C2) -->
  <g id="spine-neck" transform="translate(50, 150)">
    <circle class="icon-lime" cx="12" cy="4" r="2"/>
    <circle class="icon-lime" cx="12" cy="9" r="2.5"/>
    <circle class="icon-lime" cx="12" cy="15" r="2.5"/>
    <line class="icon-lime" x1="12" y1="6" x2="12" y2="7.5" stroke="#FFD60A" stroke-width="1.5"/>
    <line class="icon-lime" x1="12" y1="11.5" x2="12" y2="13" stroke="#FFD60A" stroke-width="1.5"/>
  </g>

  <!-- Icon 6: Brain Circuit -->
  <g id="brain-circuit" transform="translate(150, 150)">
    <path class="icon-lime" d="M8 4C6 4 5 5 5 7C5 9 6 10 8 10M16 4C18 4 19 5 19 7C19 9 18 10 16 10M12 10V18M8 10H16" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Icon 7: Inflammation Flame -->
  <g id="inflammation-flame" transform="translate(250, 150)">
    <path class="icon-lime" d="M12 2C12 2 8 8 8 12C8 15 10 17 12 17C14 17 16 15 16 12C16 8 12 2 12 2" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Icon 8: Gut Intestine -->
  <g id="gut-intestine" transform="translate(350, 150)">
    <path class="icon-lime" d="M6 4C6 6 8 8 10 8C12 8 14 6 14 4M14 4C14 6 16 8 18 8M6 12C6 14 8 16 10 16C12 16 14 14 14 12M14 12C14 14 16 16 18 16" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 9: Mast Cell -->
  <g id="mast-cell" transform="translate(50, 250)">
    <circle class="icon-lime" cx="12" cy="12" r="8" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <circle class="icon-lime" cx="12" cy="12" r="3" fill="#FFD60A"/>
    <line class="icon-lime" x1="12" y1="4" x2="12" y2="2" stroke="#FFD60A" stroke-width="1.5"/>
    <line class="icon-lime" x1="20" y1="12" x2="22" y2="12" stroke="#FFD60A" stroke-width="1.5"/>
  </g>

  <!-- Icon 10: Heart Rate Vagal -->
  <g id="heart-rate-vagal" transform="translate(150, 250)">
    <path class="icon-lime" d="M2 12L5 9L8 15L11 6L14 12L22 12" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- PROTOCOL / SCIENCE ICONS -->

  <!-- Icon 11: Pill Capsule -->
  <g id="pill-capsule" transform="translate(250, 250)">
    <ellipse class="icon-lime" cx="8" cy="12" rx="3" ry="5" fill="#FFD60A"/>
    <ellipse class="icon-lime" cx="16" cy="12" rx="3" ry="5" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <line class="icon-lime" x1="11" y1="7" x2="11" y2="17" stroke="#FFD60A" stroke-width="1"/>
  </g>

  <!-- Icon 12: Microscope -->
  <g id="microscope" transform="translate(350, 250)">
    <circle class="icon-lime" cx="12" cy="6" r="3" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <rect class="icon-lime" x="10" y="9" width="4" height="8" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <line class="icon-lime" x1="8" y1="17" x2="16" y2="17" stroke="#FFD60A" stroke-width="2"/>
  </g>

  <!-- Icon 13: Test Tube -->
  <g id="test-tube" transform="translate(50, 350)">
    <path class="icon-lime" d="M8 2H16V8C16 12 14 16 12 18C10 16 8 12 8 8V2" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line class="icon-lime" x1="8" y1="6" x2="16" y2="6" stroke="#FFD60A" stroke-width="1"/>
  </g>

  <!-- Icon 14: DNA Helix -->
  <g id="dna-helix" transform="translate(150, 350)">
    <path class="icon-lime" d="M8 4C8 4 10 6 12 6C14 6 16 4 16 4M8 12C8 12 10 14 12 14C14 14 16 12 16 12" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line class="icon-lime" x1="12" y1="4" x2="12" y2="12" stroke="#FFD60A" stroke-width="1"/>
  </g>

  <!-- Icon 15: Lab Flask -->
  <g id="lab-flask" transform="translate(250, 350)">
    <path class="icon-lime" d="M8 2H16V10C16 14 14 18 12 20C10 18 8 14 8 10V2" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line class="icon-lime" x1="10" y1="2" x2="14" y2="2" stroke="#FFD60A" stroke-width="2"/>
  </g>

  <!-- SYSTEM / META ICONS -->

  <!-- Icon 16: Gear Settings -->
  <g id="gear-settings" transform="translate(350, 350)">
    <circle class="icon-lime" cx="12" cy="12" r="3" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <path class="icon-lime" d="M12 4V2M12 22V20M20 12H22M2 12H4M17.6 6.4L19 5M5 19L6.4 17.6M17.6 17.6L19 19M5 5L6.4 6.4" stroke="#FFD60A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Icon 17: Clock Time -->
  <g id="clock-time" transform="translate(50, 450)">
    <circle class="icon-lime" cx="12" cy="12" r="9" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <line class="icon-lime" x1="12" y1="12" x2="12" y2="7" stroke="#FFD60A" stroke-width="1.5" stroke-linecap="round"/>
    <line class="icon-lime" x1="12" y1="12" x2="15" y2="12" stroke="#FFD60A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Icon 18: Calendar Day -->
  <g id="calendar-day" transform="translate(150, 450)">
    <rect class="icon-lime" x="3" y="4" width="18" height="16" stroke="#FFD60A" stroke-width="1.5" fill="none" rx="1"/>
    <line class="icon-lime" x1="3" y1="8" x2="21" y2="8" stroke="#FFD60A" stroke-width="1.5"/>
    <circle class="icon-lime" cx="12" cy="14" r="2" fill="#FFD60A"/>
  </g>

  <!-- Icon 19: Folder Structure -->
  <g id="folder-structure" transform="translate(250, 450)">
    <path class="icon-lime" d="M2 5H8L10 3H22V19H2V5" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="icon-lime" x1="2" y1="9" x2="22" y2="9" stroke="#FFD60A" stroke-width="1"/>
  </g>

  <!-- Icon 20: Target Crosshair -->
  <g id="target-crosshair" transform="translate(350, 450)">
    <circle class="icon-lime" cx="12" cy="12" r="8" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <circle class="icon-lime" cx="12" cy="12" r="4" stroke="#FFD60A" stroke-width="1.5" fill="none"/>
    <circle class="icon-lime" cx="12" cy="12" r="1.5" fill="#FFD60A"/>
    <line class="icon-lime" x1="12" y1="2" x2="12" y2="4" stroke="#FFD60A" stroke-width="1.5"/>
    <line class="icon-lime" x1="12" y1="20" x2="12" y2="22" stroke="#FFD60A" stroke-width="1.5"/>
  </g>

  <!-- SOCIAL / ENGAGEMENT ICONS -->

  <!-- Icon 21: Bookmark Save -->
  <g id="bookmark-save" transform="translate(50, 550)">
    <path class="icon-lime" d="M5 2H19V20L12 16L5 20V2" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 22: Share Arrow -->
  <g id="share-arrow" transform="translate(150, 550)">
    <path class="icon-lime" d="M18 6L22 2M22 2L18 2M22 2V6M12 12C8 12 5 14 2 18M12 12L18 6" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 23: Comment Bubble -->
  <g id="comment-bubble" transform="translate(250, 550)">
    <path class="icon-lime" d="M2 4H20V14H6L2 18V4" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 24: Fire Hot -->
  <g id="fire-hot" transform="translate(350, 550)">
    <path class="icon-lime" d="M12 2C12 2 8 8 8 12C8 15 10 18 12 18C14 18 16 15 16 12C16 8 12 2 12 2M10 14C10 15 11 16 12 16C13 16 14 15 14 14" stroke="#FFD60A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Icon 25: Trending Up -->
  <g id="trending-up" transform="translate(50, 550)" transform-origin="50 550">
    <polyline class="icon-lime" points="2,18 6,14 10,16 18,4" stroke="#FFD60A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline class="icon-lime" points="14,4 18,4 18,8" stroke="#FFD60A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>
